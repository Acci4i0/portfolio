# Builda e pubblica dist/ su GitHub Pages a ogni push su main.
# configure-pages con enablement:true imposta da solo la Source su
# "GitHub Actions": se resta "Deploy from a branch", GitHub fa partire anche
# la pipeline legacy che pubblica i sorgenti raw e, finendo per ultima,
# sovrascrive la build (pagina bianca / versione vecchia a intermittenza).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
